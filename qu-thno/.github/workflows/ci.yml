name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  # Skip env validation during CI — real vars are in GitHub Secrets
  SKIP_ENV_VALIDATION: true

jobs:
  # ============================================================
  # 1. Type Check
  # ============================================================
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check
        run: npx tsc --noEmit

  # ============================================================
  # 2. Lint
  # ============================================================
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

  # ============================================================
  # 3. Build
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    env:
      # Stub values for build — not real credentials
      DATABASE_URL: "postgresql://user:pass@localhost:5432/crp"
      DATABASE_DIRECT_URL: "postgresql://user:pass@localhost:5432/crp"
      AUTH_SECRET: "ci-secret-for-build-only-not-real-32chars"
      REDIS_URL: "redis://localhost:6379"
      ANTHROPIC_API_KEY: "sk-ant-ci-placeholder-key-for-build"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

  # ============================================================
  # 4. Database Migration Check (on main branch only)
  # ============================================================
  migration-check:
    name: Check Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Validate Prisma Schema
        run: npx prisma validate
